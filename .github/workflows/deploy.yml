name: Deploy Veridian Ecommerce

on:
  push:
    branches: ["main"] # 確保您的主分支名稱是 main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install & Build
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Next.js 靜態導出預設資料夾是 out
          # 如果您的編譯指令產生的是 dist，請改為 ./dist
          path: ./out 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
